<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barcode App</title>

  <link rel="stylesheet" href="style.css">

  <!-- Library Barcode -->
  <script src="libs/JsBarcode.all.min.js"></script>
  
  <script src="libs/html5-qrcode.min.js"></script>
</head>

<body>

<div class="container">

  <h1>Barcode System</h1>

  <input
    type="text"
    id="barcodeInput"
    placeholder="Masukkan kode..."
  >

  <svg id="barcode"></svg>

  <button id="scanBtn">
    📷 Scan Barcode
  </button>

  <div id="reader"></div>

  <h3>Hasil Scan:</h3>
  <p id="scanResult">-</p>

</div>

<script src="script.js"></script>

</body>
</html>
